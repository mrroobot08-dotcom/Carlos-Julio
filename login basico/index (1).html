<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Registro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Toast de feedback -->
<div id="toast" class="toast"></div>

<div class="container" id="container">

  <!-- ── Formulario Registro ── -->
  <div class="form-container sign-up-container" id="form-registro">
    <div class="form-inner">
      <h1>Crear cuenta</h1>
      <div class="social-container">
        <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
        <a href="#" class="social"><i class="fab fa-google"></i></a>
        <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <span>o usa tu correo para registrarte</span>

      <input type="text"     data-campo="nombre"   placeholder="Nombre completo" />
      <input type="email"    data-campo="email"     placeholder="Correo electrónico" />
      <input type="password" data-campo="password"  placeholder="Contraseña (mín. 6 caracteres)" />

      <button id="btn-registro" type="button">Registrarse</button>
    </div>
  </div>

  <!-- ── Formulario Login ── -->
  <div class="form-container sign-in-container" id="form-login">
    <div class="form-inner">
      <h1>Iniciar sesión</h1>
      <div class="social-container">
        <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
        <a href="#" class="social"><i class="fab fa-google"></i></a>
        <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <span>o usa tu cuenta</span>

      <input type="email"    data-campo="email"    placeholder="Correo electrónico" />
      <input type="password" data-campo="password" placeholder="Contraseña" />
      <a href="#">¿Olvidaste tu contraseña?</a>

      <button id="btn-login" type="button">Entrar</button>
    </div>
  </div>

  <!-- ── Panel superpuesto (animación) ── -->
  <div class="overlay-container">
    <div class="overlay">
      <div class="overlay-panel overlay-left">
        <h1>¡Bienvenido de vuelta!</h1>
        <p>Para seguir conectado ingresa con tus datos personales</p>
        <button class="ghost" id="signIn">Iniciar sesión</button>
      </div>
      <div class="overlay-panel overlay-right">
        <h1>¡Hola!</h1>
        <p>Ingresa tus datos y comienza tu experiencia con nosotros</p>
        <button class="ghost" id="signUp">Crear cuenta</button>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
